name: Build and Test

on:
  push:
    branches: [dev]
    paths:
      - "src/backend/**"
      - "src/frontend/**"
      - "tests/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [dev]
    paths:
      - "src/backend/**"
      - "src/frontend/**"
      - "tests/**"
      - ".github/workflows/ci.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: "8.0.x"
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          sparse-checkout: |
            src/backend
            tests
            .github
          fetch-depth: 1
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache packages
        uses: actions/cache@v5
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: |
          dotnet restore src/backend/api/api.csproj
          dotnet restore tests/TrainingCenter.Tests/TrainingCenter.Tests.csproj

      - name: Build
        run: |
          dotnet build src/backend/api/api.csproj --configuration Release --no-restore
          dotnet build tests/TrainingCenter.Tests/TrainingCenter.Tests.csproj --configuration Release --no-restore

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-output
          path: |
            src/backend/**/bin/Release
            tests/**/bin/Release
          retention-days: 1
          compression-level: 6

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      checks: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          sparse-checkout: |
            src/backend
            tests
            .github
          fetch-depth: 1
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache packages
        uses: actions/cache@v5
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: build-output

      - name: Run tests
        run: |
          dotnet test tests/TrainingCenter.Tests/TrainingCenter.Tests.csproj \
            --configuration Release \
            --no-build \
            --verbosity normal \
            --logger "trx;LogFileName=results.trx" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults

      - name: Publish results
        if: always()
        uses: dorny/test-reporter@v3
        with:
          name: Test Results
          path: "./TestResults/*.trx"
          reporter: dotnet-trx
          fail-on-error: false
          token: ${{ secrets.GITHUB_TOKEN }}
          use-actions-summary: true

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ github.run_id }}
          path: ./TestResults
          retention-days: 7
          overwrite: true
          compression-level: 6

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          sparse-checkout: |
            src/frontend
            .github
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20.x"
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: src/frontend

      - name: Lint
        run: npm run lint
        working-directory: src/frontend
        continue-on-error: true

      - name: Build
        run: npm run build
        working-directory: src/frontend

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: frontend-build
          path: src/frontend/dist
          retention-days: 1
          compression-level: 6