name: Build and Test

on:
  push:
    branches: [dev]
    paths:
      - "src/backend/**"
      - "tests/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [dev]
    paths:
      - "src/backend/**"
      - "tests/**"
      - ".github/workflows/ci.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: "8.0.x"
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      checks: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-
        env:
          NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

      - name: Restore
        env:
          NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages
        run: |
          dotnet restore src/backend/api/api.csproj
          dotnet restore tests/TrainingCenter.Tests/TrainingCenter.Tests.csproj

      - name: Build API
        run: |
          dotnet build src/backend/api/api.csproj \
            --configuration Release \
            --no-restore

      - name: Build Tests
        run: |
          dotnet build tests/TrainingCenter.Tests/TrainingCenter.Tests.csproj \
            --configuration Release \
            --no-restore

      - name: Test
        run: |
          dotnet test tests/TrainingCenter.Tests/TrainingCenter.Tests.csproj \
            --configuration Release \
            --no-build \
            --verbosity normal \
            --logger "trx;LogFileName=results.trx" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults

      - name: Publish test results
        uses: dorny/test-reporter@v2
        if: always()
        with:
          name: "Test Results"
          path: "./TestResults/*.trx"
          reporter: dotnet-trx
          fail-on-error: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: ./TestResults
          retention-days: 7